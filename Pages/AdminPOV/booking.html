<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book Flight – Admin</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="../UserPOV/mycss.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark navbar-expand-lg" style="border-radius:0; z-index:9999">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Airline Reservation</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
        aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="booking.html">Booking</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
        </ul>
        <div class="d-flex me-3">
          <input type="text" class="form-control me-2" placeholder="Search">
          <button class="btn btn-outline-light" type="submit"><i class="fas fa-search"></i></button>
        </div>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-right-to-bracket"></i> Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="background-wrapper d-flex align-items-center">
    <div class="container py-5">
      <header>
        <h2>Book Your Flight</h2>
        <hr>
      </header>
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <div class="card card-transparent">
            <div class="card-header text-center">
              <legend>Flight Information</legend>
            </div>
            <div class="card-body">
              <form method="post" action="flights.html">
                <div class="mb-3">
                  <label for="flightClass" class="form-label">Class</label>
                  <select class="form-select trans-input-area" id="flightClass" name="class">
                    <option>Economy</option>
                    <option>Business</option>
                    <option>First</option>
                  </select>
                </div>
                <div class="row g-3 mb-3">
                  <div class="col-md-6">
                    <label for="from" class="form-label">From</label>
                    <input type="text" class="form-control trans-input-area" id="from" name="from"
                      placeholder="Origin" required>
                  </div>
                  <div class="col-md-6">
                    <label for="to" class="form-label">To</label>
                    <input type="text" class="form-control trans-input-area" id="to" name="to"
                      placeholder="Destination" required>
                  </div>
                </div>
                <div class="row g-3 mb-3">
                  <div class="col-md-6">
                    <label for="deptDate" class="form-label">Departure Date</label>
                    <input type="date" class="form-control trans-input-area" id="deptDate" name="deptDate" required>
                  </div>
                  <div class="col-md-6">
                    <label for="retDate" class="form-label">Return Date</label>
                    <input type="date" class="form-control trans-input-area" id="retDate" name="retDate">
                  </div>
                </div>
                <div class="row g-3 mb-4">
                  <div class="col-md-6">
                    <label for="adults" class="form-label">Adults</label>
                    <input type="number" class="form-control trans-input-area" id="adults" name="adults"
                      value="1" min="1" required>
                  </div>
                  <div class="col-md-6">
                    <label for="children" class="form-label">Children</label>
                    <input type="number" class="form-control trans-input-area" id="children" name="children"
                      value="0" min="0">
                  </div>
                </div>
                <div class="text-end">
                  <button type="submit" class="btn btn-primary">
                    Continue <i class="fas fa-arrow-right"></i>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer id="footer">
    <div class="container-fluid">
      <ul class="icons">
        <li><a href="#" class="fab fa-twitter" style="color:grey" aria-label="Twitter"></a></li>
        <li><a href="#" class="fab fa-facebook" style="color:grey" aria-label="Facebook"></a></li>
        <li><a href="#" class="fab fa-instagram" style="color:grey" aria-label="Instagram"></a></li>
        <li><a href="#" class="fas fa-envelope" style="color:grey" aria-label="Email"></a></li>
      </ul>
    </div>
    <div class="copyright">&copy; Airline Reservation. All rights reserved.</div>
  </footer>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script src="../UserPOV/myjs.js"></script>
</body>
</html>
