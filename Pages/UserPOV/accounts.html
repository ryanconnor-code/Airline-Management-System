  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="mycss.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark sticky-top" style="border-radius:0; z-index:9999">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Airline Reservation</a>
      <ul class="navbar-nav ms-auto flex-row">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-user"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item fw-bold">Username</span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="home.html">View Profile</a></li>
            <li><a class="dropdown-item" href="accounts.html">Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="index.html">Logout</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="index.html"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <div style="display:flex">
    <!-- Sidebar -->
    <nav class="sidebar">
      <ul class="nav flex-column sidebar-nav py-2">
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub1">Dashboard</a>
          <div id="sub1" class="sub-nav" style="display:none">
            <a href="home.html" class="nav-link">Home</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub2">Flight Schedule</a>
          <div id="sub2" class="sub-nav" style="display:none">
            <a href="newFlight.html" class="nav-link">Search for Flights</a>
            <a href="flightResults.html" class="nav-link">Flights</a>
            <a href="userManageFlights.html" class="nav-link">Manage Flights</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link active" data-sub="sub4">Accounts</a>
          <div id="sub4" class="sub-nav">
            <a href="accounts.html" class="nav-link">Edit Account</a>
          </div>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content flex-grow-1">
      <h2>Account Settings</h2>
      <hr>
      <div class="row g-4">

        <!-- Change Password -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header text-center">
              <legend class="mb-0">Update Password</legend>
            </div>
            <div class="card-body">
              <form method="post">
                <div class="mb-3">
                  <label for="oldPwd" class="form-label">Old Password</label>
                  <input type="password" class="form-control" id="oldPwd" name="oldPwd" placeholder="Current password" required>
                </div>
                <div class="mb-3">
                  <label for="newPwd" class="form-label">New Password</label>
                  <input type="password" class="form-control" id="newPwd" name="newPwd" placeholder="New password" required>
                </div>
                <div class="mb-3">
                  <label for="confirmPwd" class="form-label">Confirm New Password</label>
                  <input type="password" class="form-control" id="confirmPwd" name="confirmPwd" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-key"></i> Update Password
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Add Payment Method -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header text-center">
              <legend class="mb-0">Add Payment Method</legend>
            </div>
            <div class="card-body">
              <form method="post">
                <div class="mb-3">
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="cardType" id="creditCard" value="credit">
                    <label class="form-check-label" for="creditCard">Credit</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="cardType" id="debitCard" value="debit">
                    <label class="form-check-label" for="debitCard">Debit</label>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="cardNum" class="form-label">Card Number</label>
                  <input type="text" class="form-control" id="cardNum" name="cardNum"
                    placeholder="0000 0000 0000 0000" maxlength="19"
                    pattern="\d{4}\s?\d{4}\s?\d{4}\s?\d{4}" required>
                </div>
                <div class="row g-3 mb-3">
                  <div class="col-6">
                    <label for="expiry" class="form-label">Expiry Date</label>
                    <input type="month" class="form-control" id="expiry" name="expiry" required>
                  </div>
                  <div class="col-6">
                    <label for="cvc" class="form-label">CVC</label>
                    <input type="number" class="form-control" id="cvc" name="cvc"
                      placeholder="123" min="100" max="9999" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-plus"></i> Add Payment Method
                </button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script src="myjs.js"></script>
</body>
</html>
