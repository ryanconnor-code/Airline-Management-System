<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account Settings – SkyLine Air</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="mycss.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-plane brand-icon"></i> SkyLine Air
      </a>
      <ul class="navbar-nav ms-auto flex-row align-items-center gap-2">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-user-circle me-1"></i> Username
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item fw-bold text-muted" style="font-size:0.8rem">ACCOUNT</span></li>
            <li><a class="dropdown-item" href="home.html"><i class="fas fa-user me-2 text-primary"></i>View Profile</a></li>
            <li><a class="dropdown-item" href="accounts.html"><i class="fas fa-gear me-2 text-muted"></i>Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="index.html"><i class="fas fa-right-from-bracket me-2"></i>Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </nav>

  <div style="display:flex">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <ul class="nav flex-column sidebar-nav py-1">
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub1">
            <i class="fas fa-gauge-high menu-icon"></i> Dashboard
            <i class="fas fa-chevron-down chevron"></i>
          </a>
          <div id="sub1" class="sub-nav" style="display:none">
            <a href="home.html" class="nav-link">Home</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub2">
            <i class="fas fa-plane-departure menu-icon"></i> Flights
            <i class="fas fa-chevron-down chevron"></i>
          </a>
          <div id="sub2" class="sub-nav" style="display:none">
            <a href="newFlight.html" class="nav-link">Search Flights</a>
            <a href="flightResults.html" class="nav-link">Results</a>
            <a href="userManageFlights.html" class="nav-link">My Bookings</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link active" data-sub="sub4">
            <i class="fas fa-user-gear menu-icon"></i> Account
            <i class="fas fa-chevron-down chevron"></i>
          </a>
          <div id="sub4" class="sub-nav">
            <a href="accounts.html" class="nav-link">Edit Account</a>
          </div>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content flex-grow-1">
      <div class="page-header">
        <h2>
          <span class="page-header-icon"><i class="fas fa-gear"></i></span>
          Account Settings
        </h2>
        <hr>
      </div>

      <div class="row g-4">
        <!-- Change Password -->
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header">
              <legend><i class="fas fa-lock me-2"></i>Update Password</legend>
            </div>
            <div class="card-body">
              <form method="post">
                <div class="mb-3">
                  <label for="oldPwd" class="form-label">Current Password</label>
                  <input type="password" class="form-control" id="oldPwd" name="oldPwd" placeholder="Enter current password" required>
                </div>
                <div class="mb-3">
                  <label for="newPwd" class="form-label">New Password</label>
                  <input type="password" class="form-control" id="newPwd" name="newPwd" placeholder="Choose a new password" required>
                </div>
                <div class="mb-4">
                  <label for="confirmPwd" class="form-label">Confirm New Password</label>
                  <input type="password" class="form-control" id="confirmPwd" name="confirmPwd" placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-key me-2"></i>Update Password
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Add Payment Method -->
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header">
              <legend><i class="fas fa-credit-card me-2"></i>Add Payment Method</legend>
            </div>
            <div class="card-body">
              <form method="post">
                <div class="mb-3">
                  <label class="form-label">Card Type</label>
                  <div class="d-flex gap-3">
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="cardType" id="creditCard" value="credit">
                      <label class="form-check-label" for="creditCard"><i class="fas fa-credit-card me-1 text-primary"></i>Credit</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="cardType" id="debitCard" value="debit">
                      <label class="form-check-label" for="debitCard"><i class="fas fa-wallet me-1 text-primary"></i>Debit</label>
                    </div>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="cardNum" class="form-label">Card Number</label>
                  <input type="text" class="form-control" id="cardNum" name="cardNum"
                    placeholder="0000 0000 0000 0000" maxlength="19"
                    pattern="\d{4}\s?\d{4}\s?\d{4}\s?\d{4}" required>
                </div>
                <div class="row g-3 mb-4">
                  <div class="col-6">
                    <label for="expiry" class="form-label">Expiry Date</label>
                    <input type="month" class="form-control" id="expiry" name="expiry" required>
                  </div>
                  <div class="col-6">
                    <label for="cvc" class="form-label">CVC</label>
                    <input type="number" class="form-control" id="cvc" name="cvc"
                      placeholder="123" min="100" max="9999" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-plus me-2"></i>Add Payment Method
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script src="myjs.js"></script>
</body>
</html>
