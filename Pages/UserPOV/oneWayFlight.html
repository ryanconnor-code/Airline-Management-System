<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One-Way Flight – Airline Reservation</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="mycss.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark sticky-top" style="border-radius:0; z-index:9999">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Airline Reservation</a>
      <ul class="navbar-nav ms-auto flex-row">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-user"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item fw-bold">Username</span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="home.html">View Profile</a></li>
            <li><a class="dropdown-item" href="accounts.html">Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="index.html">Logout</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="index.html"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <div style="display:flex">
    <!-- Sidebar -->
    <nav class="sidebar">
      <ul class="nav flex-column sidebar-nav py-2">
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub1">Dashboard</a>
          <div id="sub1" class="sub-nav" style="display:none">
            <a href="home.html" class="nav-link">Home</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link active" data-sub="sub2">Flight Schedule</a>
          <div id="sub2" class="sub-nav">
            <a href="newFlight.html" class="nav-link">Search for Flights</a>
            <a href="flightResults.html" class="nav-link">Flights</a>
            <a href="userManageFlights.html" class="nav-link">Manage Flights</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub4">Accounts</a>
          <div id="sub4" class="sub-nav" style="display:none">
            <a href="accounts.html" class="nav-link">Edit Account</a>
          </div>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content flex-grow-1">
      <h2>Search for Flights</h2>
      <hr>
      <div class="card">
        <div class="card-header text-center">
          <legend class="mb-0">One-Way</legend>
        </div>
        <div class="card-body">
          <form method="post" action="flightResults.html">
            <!-- Trip type toggle -->
            <div class="mb-3">
              <a href="oneWayFlight.html" class="btn btn-primary">One Way</a>
              <a href="newFlight.html" class="btn btn-outline-secondary ms-2">Round Trip</a>
            </div>

            <!-- Origin / Destination -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="toAirport" class="form-label">To</label>
                <select class="form-select" id="toAirport" name="to">
                  <option>O'Hare (ORD)</option>
                  <option>Cincinnati (CVG)</option>
                  <option>Dayton (DAY)</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="fromAirport" class="form-label">From</label>
                <select class="form-select" id="fromAirport" name="from">
                  <option>Detroit (DTW)</option>
                  <option>St. Paul (MSP)</option>
                  <option>Columbus (CMH)</option>
                </select>
              </div>
            </div>

            <!-- Date / Time -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="deptDate" class="form-label">Departure Date</label>
                <input type="date" class="form-control" id="deptDate" name="deptDate" required>
              </div>
              <div class="col-md-6">
                <label for="deptTime" class="form-label">Departure Time</label>
                <input type="time" class="form-control" id="deptTime" name="deptTime">
              </div>
            </div>

            <!-- Layovers -->
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label for="layovers" class="form-label">Layovers</label>
                <input type="number" class="form-control" id="layovers" name="layovers" value="0" min="0">
              </div>
            </div>

            <!-- Class selection accordion -->
            <p class="fw-semibold">Cabin Class</p>
            <div class="accordion mb-3" id="classAccordion">
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseFirst">
                    First Class
                  </button>
                </h2>
                <div id="collapseFirst" class="accordion-collapse collapse" data-bs-parent="#classAccordion">
                  <div class="accordion-body">
                    <div class="row g-2">
                      <div class="col-md-4">
                        <label class="form-label">Seats</label>
                        <input type="number" class="form-control" name="firstSeats" value="0" min="0">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Price per seat</label>
                        <input type="number" class="form-control" name="firstPrice" value="0" min="0">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Features</label>
                        <input type="text" class="form-control" name="firstFeatures" placeholder="e.g. Wi-Fi, Meals">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseBusiness">
                    Business Class
                  </button>
                </h2>
                <div id="collapseBusiness" class="accordion-collapse collapse" data-bs-parent="#classAccordion">
                  <div class="accordion-body">
                    <div class="row g-2">
                      <div class="col-md-4">
                        <label class="form-label">Seats</label>
                        <input type="number" class="form-control" name="bizSeats" value="0" min="0">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Price per seat</label>
                        <input type="number" class="form-control" name="bizPrice" value="0" min="0">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Features</label>
                        <input type="text" class="form-control" name="bizFeatures">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseEconomy">
                    Economy Class
                  </button>
                </h2>
                <div id="collapseEconomy" class="accordion-collapse collapse" data-bs-parent="#classAccordion">
                  <div class="accordion-body">
                    <div class="row g-2">
                      <div class="col-md-4">
                        <label class="form-label">Seats</label>
                        <input type="number" class="form-control" name="econSeats" value="0" min="0">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Price per seat</label>
                        <input type="number" class="form-control" name="econPrice" value="0" min="0">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Features</label>
                        <input type="text" class="form-control" name="econFeatures">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="text-end">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-search"></i> Search
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script src="myjs.js"></script>
</body>
</html>
