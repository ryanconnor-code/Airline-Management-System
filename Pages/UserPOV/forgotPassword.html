<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password – SkyLine Air</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="mycss.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark navbar-expand-lg sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-plane brand-icon"></i> SkyLine Air
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
        aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="aboutUS.html"><i class="fas fa-circle-info me-1"></i>About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="contactus.html"><i class="fas fa-envelope me-1"></i>Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="background-wrapper d-flex align-items-center">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-sm-10 col-md-6 col-lg-4">
          <div class="card card-transparent">
            <div class="card-header text-center">
              <legend><i class="fas fa-lock-open me-2"></i>Reset Password</legend>
            </div>
            <div class="card-body">
              <p style="color:rgba(255,255,255,0.6);font-size:0.85rem;margin-bottom:1.25rem">
                Enter the email address linked to your account and we'll send you a password reset link.
              </p>
              <form method="post">
                <div class="mb-4">
                  <label for="resetEmail" class="form-label">Email Address</label>
                  <input type="email" class="form-control trans-input-area" id="resetEmail"
                    placeholder="example@email.com" name="email" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-2">
                  <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                </button>
                <a href="index.html" class="btn btn-secondary w-100">
                  <i class="fas fa-arrow-left me-2"></i>Back to Login
                </a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer id="footer">
    <div class="container">
      <span class="footer-brand"><i class="fas fa-plane brand-icon"></i> SkyLine Air</span>
      <p class="footer-tagline">Your trusted partner for air travel worldwide.</p>
      <ul class="icons">
        <li><a href="https://twitter.com/" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a></li>
        <li><a href="https://www.facebook.com/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a></li>
        <li><a href="https://www.instagram.com/" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a></li>
        <li><a href="mailto:info@skylineair.com" aria-label="Email"><i class="fas fa-envelope"></i></a></li>
      </ul>
      <p class="copyright">&copy; 2026 SkyLine Air Reservation System. All rights reserved.</p>
    </div>
  </footer>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script src="myjs.js"></script>
</body>
</html>
