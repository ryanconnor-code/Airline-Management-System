<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password – Airline Reservation</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="mycss.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark navbar-expand-lg" style="border-radius:0; z-index:9999">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Airline Reservation</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
        aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="aboutUS.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="contactus.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="background-wrapper d-flex align-items-center">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card card-transparent">
            <div class="card-header text-center">
              <legend>Forgot Password</legend>
            </div>
            <div class="card-body">
              <form method="post">
                <div class="mb-3">
                  <label for="resetEmail" class="form-label fw-bold">Email</label>
                  <input type="email" class="form-control trans-input-area" id="resetEmail"
                    placeholder="example@email.com" name="email" required>
                </div>
                <button type="submit" class="btn btn-secondary w-100">Send Reset Email</button>
              </form>
              <div class="mt-2">
                <a href="index.html" class="btn btn-secondary w-100">Cancel</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer id="footer">
    <div class="container-fluid">
      <ul class="icons">
        <li><a href="https://twitter.com/" class="fab fa-twitter" style="color:grey" target="_blank" aria-label="Twitter"></a></li>
        <li><a href="https://www.facebook.com/" class="fab fa-facebook" style="color:grey" target="_blank" aria-label="Facebook"></a></li>
        <li><a href="https://www.instagram.com/" class="fab fa-instagram" style="color:grey" target="_blank" aria-label="Instagram"></a></li>
        <li><a href="mailto:info@airlinereservation.com" class="fas fa-envelope" style="color:grey" aria-label="Email"></a></li>
      </ul>
    </div>
    <div class="copyright">&copy; Airline Reservation. All rights reserved.</div>
  </footer>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script src="myjs.js"></script>
</body>
</html>
