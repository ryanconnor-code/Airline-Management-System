<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search Flights – SkyLine Air</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="mycss.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-plane brand-icon"></i> SkyLine Air
      </a>
      <ul class="navbar-nav ms-auto flex-row align-items-center gap-2">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-user-circle me-1"></i> Username
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item fw-bold text-muted" style="font-size:0.8rem">ACCOUNT</span></li>
            <li><a class="dropdown-item" href="home.html"><i class="fas fa-user me-2 text-primary"></i>View Profile</a></li>
            <li><a class="dropdown-item" href="accounts.html"><i class="fas fa-gear me-2 text-muted"></i>Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="index.html"><i class="fas fa-right-from-bracket me-2"></i>Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </nav>

  <div style="display:flex">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <ul class="nav flex-column sidebar-nav py-1">
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub1">
            <i class="fas fa-gauge-high menu-icon"></i> Dashboard
            <i class="fas fa-chevron-down chevron"></i>
          </a>
          <div id="sub1" class="sub-nav" style="display:none">
            <a href="home.html" class="nav-link">Home</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link active" data-sub="sub2">
            <i class="fas fa-plane-departure menu-icon"></i> Flights
            <i class="fas fa-chevron-down chevron"></i>
          </a>
          <div id="sub2" class="sub-nav">
            <a href="newFlight.html" class="nav-link">Search Flights</a>
            <a href="flightResults.html" class="nav-link">Results</a>
            <a href="userManageFlights.html" class="nav-link">My Bookings</a>
          </div>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-sub="sub4">
            <i class="fas fa-user-gear menu-icon"></i> Account
            <i class="fas fa-chevron-down chevron"></i>
          </a>
          <div id="sub4" class="sub-nav" style="display:none">
            <a href="accounts.html" class="nav-link">Edit Account</a>
          </div>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content flex-grow-1">
      <div class="page-header">
        <h2>
          <span class="page-header-icon"><i class="fas fa-magnifying-glass"></i></span>
          Search Flights
        </h2>
        <hr>
      </div>

      <div class="card">
        <div class="card-header">
          <legend><i class="fas fa-route me-2"></i>Round Trip</legend>
        </div>
        <div class="card-body">
          <!-- Trip type toggle -->
          <div class="d-flex gap-2 mb-4">
            <a href="oneWayFlight.html" class="btn btn-outline-primary">
              <i class="fas fa-arrow-right me-2"></i>One Way
            </a>
            <a href="newFlight.html" class="btn btn-primary">
              <i class="fas fa-arrows-left-right me-2"></i>Round Trip
            </a>
          </div>

          <form method="post" action="flightResults.html">
            <!-- Origin / Destination -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="fromAirport" class="form-label"><i class="fas fa-plane-departure me-1 text-primary"></i>From</label>
                <select class="form-select" id="fromAirport" name="from">
                  <option>Detroit (DTW)</option>
                  <option>St. Paul (MSP)</option>
                  <option>Columbus (CMH)</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="toAirport" class="form-label"><i class="fas fa-plane-arrival me-1 text-primary"></i>To</label>
                <select class="form-select" id="toAirport" name="to">
                  <option>O'Hare (ORD)</option>
                  <option>Cincinnati (CVG)</option>
                  <option>Dayton (DAY)</option>
                </select>
              </div>
            </div>

            <!-- Dates / Times -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="deptDate" class="form-label"><i class="fas fa-calendar me-1 text-primary"></i>Departure Date</label>
                <input type="date" class="form-control" id="deptDate" name="deptDate" required>
              </div>
              <div id="box" class="col-md-6">
                <label for="retDate" class="form-label"><i class="fas fa-calendar-check me-1 text-primary"></i>Return Date</label>
                <input type="date" class="form-control" id="retDate" name="retDate">
              </div>
              <div class="col-md-6">
                <label for="deptTime" class="form-label"><i class="fas fa-clock me-1 text-primary"></i>Departure Time</label>
                <input type="time" class="form-control" id="deptTime" name="deptTime">
              </div>
              <div class="col-md-6">
                <label for="retTime" class="form-label"><i class="fas fa-clock me-1 text-primary"></i>Return Time</label>
                <input type="time" class="form-control" id="retTime" name="retTime">
              </div>
            </div>

            <!-- Passengers / Layovers -->
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <label for="layovers" class="form-label"><i class="fas fa-code-branch me-1 text-primary"></i>Layovers</label>
                <input type="number" class="form-control" id="layovers" name="layovers" value="0" min="0">
              </div>
            </div>

            <!-- Class selection accordion -->
            <p class="fw-bold mb-2" style="color:#374151"><i class="fas fa-couch me-2 text-primary"></i>Cabin Class</p>
            <div class="accordion mb-4" id="classAccordion">
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseFirst" aria-expanded="false">
                    <i class="fas fa-crown me-2" style="color:var(--brand-gold)"></i>First Class
                  </button>
                </h2>
                <div id="collapseFirst" class="accordion-collapse collapse" data-bs-parent="#classAccordion">
                  <div class="accordion-body">
                    <div class="row g-3">
                      <div class="col-md-4">
                        <label class="form-label">Seats</label>
                        <input type="number" class="form-control" name="firstSeats" value="1" min="1">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Price per Seat</label>
                        <div class="input-group">
                          <span class="input-group-text">$</span>
                          <input type="number" class="form-control" name="firstPrice" value="0" min="0">
                        </div>
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Features</label>
                        <input type="text" class="form-control" name="firstFeatures" placeholder="e.g. Wi-Fi, Meals">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseBusiness" aria-expanded="false">
                    <i class="fas fa-briefcase me-2" style="color:var(--brand-accent)"></i>Business Class
                  </button>
                </h2>
                <div id="collapseBusiness" class="accordion-collapse collapse" data-bs-parent="#classAccordion">
                  <div class="accordion-body">
                    <div class="row g-3">
                      <div class="col-md-4">
                        <label class="form-label">Seats</label>
                        <input type="number" class="form-control" name="bizSeats" value="1" min="1">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Price per Seat</label>
                        <div class="input-group">
                          <span class="input-group-text">$</span>
                          <input type="number" class="form-control" name="bizPrice" value="0" min="0">
                        </div>
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Features</label>
                        <input type="text" class="form-control" name="bizFeatures" placeholder="e.g. Lounge access">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseEconomy" aria-expanded="false">
                    <i class="fas fa-ticket me-2 text-muted"></i>Economy Class
                  </button>
                </h2>
                <div id="collapseEconomy" class="accordion-collapse collapse" data-bs-parent="#classAccordion">
                  <div class="accordion-body">
                    <div class="row g-3">
                      <div class="col-md-4">
                        <label class="form-label">Seats</label>
                        <input type="number" class="form-control" name="econSeats" value="1" min="1">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Price per Seat</label>
                        <div class="input-group">
                          <span class="input-group-text">$</span>
                          <input type="number" class="form-control" name="econPrice" value="0" min="0">
                        </div>
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Features</label>
                        <input type="text" class="form-control" name="econFeatures" placeholder="e.g. In-flight snacks">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
              <button type="reset" class="btn btn-outline-secondary">
                <i class="fas fa-rotate-left me-1"></i> Reset
              </button>
              <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-magnifying-glass me-2"></i>Search Flights
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script src="myjs.js"></script>
  <script src="hideshow.js"></script>
</body>
</html>
